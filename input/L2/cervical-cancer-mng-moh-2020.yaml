# =============================================================================
# Mongolia MOH 2020 Cervical Cancer Surveillance Guideline — L2 Representation
# =============================================================================
#
# ROLE
#   This file is the L2 (operational) layer for the smart-dak-cxca DAK. It is
#   the structured rendering of the Mongolia MOH A/641 (2020) ministerial
#   order — the L1 source — into the axes / parameters / algorithms /
#   triggers / forms / indicators that the L3 FHIR artifacts in this repo
#   derive from.
#
#   Source-of-truth chain for this DAK:
#       L1 (narrative)   A/641 PDF, WHO 2021 guideline, WHO Mongolia news items
#                        ↓
#       L2 (this file)   structured operational representation
#                        ↓
#       L3 (input/fsh, input/cql)   FHIR resources + CQL libraries
#
#   L3 artifacts cite this file via @source: anchors of the form
#       l2://cervical-cancer-mng-moh-2020.yaml#<path>
#   so that runtime contracts (PlanDefinition.action ↔ CQL define ↔
#   ActivityDefinition triples) trace back to a versioned operational anchor.
#
# LINEAGE
#   This file extends the "Shape B" representation that lived at
#       dak-authoring-methodology/country-level/mongolia/
#         cervical-cancer-mng-moh-2020-shape-b.yaml (2026-04-25 draft).
#   The methodology repo retains a snapshot for documentation; this file
#   is the canonical, versioned L2 going forward.
#
# WHAT'S NEW IN THIS REVISION (v0.2.0, 2026-05-06)
#
# This revision was generated from a fresh single-source reading of the A/641
# PDF — the L1 layer at input/L1/ now exists as the bilingual provenance
# trail. v0.2.0 incorporates findings from that fresh L1 read. Major changes:
#
#   1. ЭИМ abbreviation expansion CORRECTED (was "Эрүүл мэндийн бүртгэлийн
#      маягт" / health-registry form; the actual expansion per A/641 p. 7 is
#      "Эрт илрүүлгийн маягт" / early-detection form).
#   2. Form catalog corrected — A/641 uses BOTH naming systems concurrently:
#      ЭИМ-5.1 and ЭИМ-5.2 are SUMMARY PATIENT RECORDS (primary care vs.
#      secondary care); ЭИМ-5а..5е are ACCOMPANYING SLIPS (invitation,
#      sample referrals, result, recall). v0.1.0 over-corrected to drop
#      ЭИМ-5.1/5.2 entirely; v0.2.0 represents both.
#   3. Cytology pathway notes updated — the source frames cytology as
#      TRANSITIONAL ("during the preparatory period") and adds that
#      cytology can ALSO be used at HPV-capable sites for women outside
#      35/45 ages. Two roles, not one.
#   4. Result-code mapping SPLIT into two entries — ICD-10 mapping
#      (Хүснэгт 2.2, Ch. 2.3.3) and Bethesda × CIN × WHO terminology
#      mapping (Хүснэгт X.4, Annex 4). v0.1.0 conflated these.
#   5. Pre-screening counseling parameter ADDED (Ch. 2.2.3) — six required
#      consent topics that were missing from v0.1.0.
#   6. Birthday-anchored invitation timing ADDED (Ch. 2.3.5) — invitations
#      go out 7 days BEFORE the woman's birthday in the screening year,
#      with a 30-day attendance window after.
#   7. Registry architecture section ADDED (Зураг 2.5) — three-tier
#      hierarchy (primary → secondary → ХЦУТ → MOH) with form-flow paths.
#   8. Triage sub-algorithms EXPANDED from 6 to 10 — added AGC, CIN1
#      confirmed, CIN2 confirmed, CIN2/CIN3 or AIS treatment.
#   9. Treatment modalities EXPANDED — added Thermal Ablation (third
#      modality alongside LEEP and cone-shaped excision); added cone-shaped
#      excision as distinct from LEEP.
#  10. AIS / Adenocarcinoma in situ ADDED as a distinct category — the
#      source treats AIS (БЭБӨ) separately from CIN with its own treatment
#      branch.
#  11. Indicator framework UPDATED to full 14-metric framework from
#      Annex 2 (was "estimated >9 metrics" in v0.1.0). cxca implements
#      5–7 of the 14.
#
# WHAT'S NEW IN THE PRIOR REVISION (v0.1.0, 2026-05-06)
#   1. Initial restructuring of the 2026-04-25 Shape B draft into the L2
#      role for the cxca DAK; established the bindingness layering, the
#      Khan-Uul pilot evidence section, and the mappings-to-L3 section.
#
# REPRESENTATION NOTES
#   * Chapters relevant to L2: Ch. 2 (screening) and Ch. 5 (pre-cancer
#     diagnosis & treatment). Ch. 1 (intro/anatomy), Ch. 3 (community),
#     Ch. 4 (HPV vaccination), Ch. 6 (invasive cancer), Ch. 7 (palliative)
#     are not represented here.
#   * "Zurag" (Зураг) = figure/diagram in the source PDF.
#   * "ЭИМ" = Эрт илрүүлгийн маягт (early-detection form).
#   * "АМ" = cancer-notification series; АМ-5 is the cervical-cancer
#     notification page.
#   * Op.Inst. = "Operational Instruction" (Үйлдлийн зааварчилгаа), the
#     procedure-level SOPs in the back of the order.
#   * Source PDF page numbers refer to the Mongolian original (166 pages);
#     the bilingual L1 layer at input/L1/ has the side-by-side translations.

# -----------------------------------------------------------------------------
# Versioning
# -----------------------------------------------------------------------------
version: 0.2.0
revised: 2026-05-06
authors:
  - Dan Heslinga (independent contributor)
license: CC0-1.0

