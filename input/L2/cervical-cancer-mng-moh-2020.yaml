# =============================================================================
timeline:
  - { date: "2011",       event: "MOH Order 168 establishes prior screening regime (later partly superseded by A/641)." }
  - { date: "2012",       event: "MOH Order 76 amends 2011 regime (appendix 1, later superseded by A/641)." }
  - { date: "2020-12-31", event: "MOH Order A/641 promulgated; current legal instrument." }
  - { date: "2022-01",    event: "UNFPA APRO + Cancer Council NSW publish Mongolia Country Review & Roadmap for Action — analytical groundwork for the elimination initiative." }
  - { date: "2024",       event: "GAVI/UNICEF-funded HPV vaccine introduction (separate financing track from screening)." }
  - { date: "2025-04-21", event: "Cervical Cancer Elimination Initiative launched in Ulaanbaatar; programmatic ages 30 and 40 announced." }
  - { date: "2025-2026",  event: "Khan-Uul District HPV-DNA pilot — initially ages 35–45, expanded to 40–60 mid-execution." }
  - { date: "2026-04-16", event: "WHO Mongolia publishes pilot conclusion: 5,382 women tested, 371 HPV+, 50% LTFU among HPV+." }
  - { date: "2026-04-16", event: "National Acceleration Plan for Cervical Cancer Elimination presented (Dr L. Tumurbaatar) — instrument not yet located." }
  - { date: "ongoing",    event: "Nationwide roll-out announced with Unitaid + Government of Japan funding under WHO technical guidance." }

# =============================================================================
# Section 4 — Axes
# =============================================================================
# Selector dimensions that any individual rule may depend on. Note these are
# RICHER than WHO 2021's axis set — particularly `lab_capacity`, which WHO
# 2021 does not carry as a first-class axis. This is one of the cxca DAK's
# methodology contributions: surfacing facility lab capacity as a selector.
axes:
  lab_capacity:    [hpv-capable, hpv-incapable]
  population:      [general, pregnant, post-menopausal, hiv-positive]
  primary_test:    [hpv-dna, cytology]      # VIA defined as procedure but not used as screening test
  approach:        [screen-triage-and-treat]    # screen-and-treat is NOT offered in Mongolia
  # cytology_result enumerates the algorithm-decision-relevant Bethesda
  # categories used by the screening pathways. Annex 5 defines a fuller
  # Bethesda 2014 vocabulary including reactive changes, microorganisms
  # (Trichomonas, Candida, BV, Actinomyces, HSV, CMV), and seven distinct
  # glandular states; those are not enumerated here but are available in
  # the L1 layer (input/L1/annex-04-05-classification.md). See
  # `bethesda_2014_findings` axis below for the descriptive findings split.
  cytology_result: [NILM, ASC-US, ASC-H, LSIL, HSIL, AGC]
  hpv_result:      [negative, positive]
  triage_test:
    - reflex-cytology              # cytology slide collected at first visit, read only if HPV+
    - colposcopy
    - biopsy
    - endocervical-curettage
  # cin_grade represents the SQUAMOUS lineage of pre-cancer/cancer.
  # AIS is GLANDULAR; treated separately. v0.2.0 makes this distinction
  # explicit by adding a sibling axis `glandular_lesion` rather than
  # collapsing AIS into cin_grade.
  cin_grade:       [none, CIN1, CIN2, CIN3, invasive-cancer]
  glandular_lesion: [none, atypical-glandular, AIS, glandular-invasive-cancer]
  treatment_modality: [thermal-ablation, leep, cone-shaped-excision, hysterectomy]
  bindingness:     [legal, programmatic, operational]   # cross-references Section 2

# =============================================================================
# Section 5 — Parameters
# =============================================================================
parameters:

  # Ch. 2.2 — target age group & schedule, selected by lab capacity.
  # @source: A/641 Ch. 2.2 (pp. 22-23) + Annex 2 (#1, #2); @bindingness: legal
  # @l1: input/L1/ch02-screening.md#Section-2-2-Cervical-Cancer-Screening
  - id: screening-schedule
    bindingness: legal
    depends_on: [lab_capacity]
    values:
      hpv-incapable:
        test: cytology
        ages: [30, 33, 36, 39, 42, 45, 48, 51, 54, 57, 60]
        interval: 3y
        notes: |
          11 scheduled tests between ages 30 and 60 inclusive.
          IMPORTANT: A/641 explicitly frames cytology screening as a
          TRANSITIONAL measure during the "preparatory period"
          (бэлтгэлийн хугацаанд) — i.e., until HPV testing capacity is
          built up at all units. Cytology is the fallback at sites
          without HPV capability, not a permanent parallel regime.
      hpv-capable:
        test: hpv-dna
        ages: [35, 45]
        interval: 10y
        lifetime_tests: 2
        notes: "Only two lifetime HPV tests, at ages 35 and 45."
    additional_role: |
      Per the figure 2.3 caption (Ch. 2.2.4): the cytology algorithm is
      ALSO used at HPV-capable sites for women OUTSIDE the 35/45 ages
      (i.e., women aged 30-60 not at the binding HPV ages can
      opportunistically receive cytology screening at HPV-capable sites).
      The cytology arm thus has two roles: (a) transitional fallback at
      non-HPV sites; (b) opportunistic at HPV-capable sites for women
      outside the HPV schedule.
    invitation_timing:
      schedule_anchor: birthday
      invitation_lead_time: 7d   # invitation delivered 7 days BEFORE birthday
      attendance_window: 30d     # screened within 30 days AFTER birthday
      source: "A/641 Ch. 2.3.5 (p. 28)"
      notes: |
        Each year, the population information bank selects target-age women
        for the relevant year. The screening invitation is delivered 7 days
        before the woman's birthday in that year, and she should be
        screened within 30 days AFTER her birthday. This birthday-anchored
        timing is L3-relevant for any future PlanDefinition that schedules
        screening events on a calendar basis.

  # Programmatic overlay from April 2025 launch.
  # @source: who-mongolia-cervical-cancer-elimination-launch-2025-04-21.md
  # @bindingness: programmatic
  - id: screening-schedule-programmatic
    bindingness: programmatic
    depends_on: []
    values:
      ages: [30, 40]
      interval: 10y
      notes: "Programme-funded elimination-initiative sites only."

  - id: start-age
    bindingness: legal
    depends_on: [lab_capacity]
    values: { hpv-incapable: 30, hpv-capable: 35 }

  - id: stop-age
    bindingness: legal
    depends_on: [lab_capacity]
    values: { hpv-incapable: 60, hpv-capable: 45 }

  # Ch. 2.2 — pregnancy inclusion
  - id: pregnancy-inclusion
    bindingness: legal
    rule: "Pregnant women in the first 3 months of pregnancy may be included if otherwise eligible."

  # Ch. 2.2 — exclusion rules
  - id: exclusions
    bindingness: legal
    rules:
      - id: excl-hpv-negative-lifetime
        rule: "Women with negative HPV tests at BOTH ages 35 and 45 are removed from the screening registry."
      - id: excl-cyto-stop-after-60
        rule: "Women aged > 60 with consistent normal cytology results exit the cytology pathway."
      - id: excl-post-hysterectomy
        rule: >-
          Women who had hysterectomy for non-cervical-cancer indication, provided
          post-surgical vaginal-vault cytology is negative.

  # Ch. 2.2.3 — required content of pre-screening counseling.
  # @source: A/641 Ch. 2.2.3 (pp. 22-23); @bindingness: legal
  # @l1: input/L1/ch02-screening.md#2-2-3-Pre-screening-counseling-required-content
  # ADDED in v0.2.0. The provider must explain six topics in plain language
  # before the woman is screened. This is the informed-consent gate before
  # any screening event.
  - id: pre-screening-counseling
    bindingness: legal
    required_content:
      - "What cervical cancer (УХХХ) is, and how it is detected"
      - "About cervical cancer prevention, and about pre-cancer (ХУЭ)"
      - "Importance of being included in screening"
      - "Information about positive test result handling — explain it; advise on next exam; explain importance of follow-up monitoring"
      - "What test will be performed, its risks, possible discomforts"
      - "That declining screening will entail accepting some responsibility"
    notes: |
      A future L3 PlanDefinition for the screening-encounter could fire a
      consent action that requires evidence of all six topics having been
      covered. Currently no L3 representation exists for this.

  # Op.Inst. 5.1 — first-encounter anamnesis intake.
  # @source: A/641 Op.Inst. 5.1 (pp. 104-106)
  # @l1: input/L1/opinst-05-01-anamnesis.md
  # This is the per-client intake that gates eligibility evaluation. NO pre-printed
  # form exists for the anamnesis itself — the worker captures into the ambulatory
  # card. A subset of these fields ALSO appears as the embedded mini-anamnesis on
  # forms ЭИМ-5б and ЭИМ-5в.
  - id: anamnesis-intake
    bindingness: legal
    source: "Op.Inst. 5.1, pp. 104-106"
    fields:
      - { id: age,                          type: integer,    drives: eligibility }
      - { id: education,                    type: string,     drives: demographic }
      - { id: pregnancy-count,              type: integer }
      - { id: delivery-count,               type: integer }
      - { id: live-birth-count,             type: integer }
      - { id: last-menstrual-period,        type: date,       drives: "sample timing — no cytology if menses heavy or pregnancy >3mo" }
      - { id: menstrual-cycle-status,       type: string }
      # Source treats current and past contraception as a single composite
      # item ("одоогийн болон хэрэглэж байсан жирэмслэхээс хамгаалах арга");
      # we represent them as discrete fields here for L3-Questionnaire convenience.
      - { id: current-contraception,        type: string }
      - { id: past-contraception,           type: string }
      - { id: age-at-first-sexual-contact,  type: integer,    drives: risk-factor }
      - { id: age-at-first-delivery,        type: integer,    drives: risk-factor }
      - { id: number-of-sexual-partners,    type: integer,    drives: risk-factor }
      - { id: sti-history,                  type: structured, drives: risk-factor }
      - { id: last-cxca-screening-date,     type: date,       drives: "recall vs. new-enrollment branch" }
      - { id: last-cxca-screening-test,     type: code,       values: [hpv, cytology, unknown] }
      - { id: last-cxca-screening-result,   type: string }
      - { id: past-disease-history,         type: string }
      - { id: smoking,                      type: code,       values: [current, past, never], drives: risk-factor }
      - { id: alcohol-use,                  type: code,       drives: risk-factor }
      # Source phrasing is open-ended ("УХХХ ба бусад өвчний шинж тэмдэг" =
      # "signs/symptoms of cervical cancer and other diseases"); examples
      # listed here are L2 implementation guidance, not source-enumerated.
      - { id: current-symptoms,             type: structured, examples: [bleeding, discharge, post-coital-bleeding] }
    exam_parts:
      - { order: 1, name: "External genitalia inspection" }
      - { order: 2, name: "Speculum (mirror) inspection" }
      - { order: 3, name: "Bimanual exam" }
    post_exam_workflow:
      # Steps 17-22 of the Op.Inst. 5.1 protocol (L1 §3.6).
      - { id: document-in-card,        action: "Document exam findings in the ambulatory card" }
      - { id: communicate-to-woman,    action: "Tell the woman about exam findings; explain any abnormalities" }
      - { id: sti-partner-treatment,   action: "If signs of STI (BЗДХ) appear, examine the partner together and treat as a couple" }
      - { id: urgent-referral,         action: "If urgent diagnosis is needed, refer to next-tier facility" }
      - { id: schedule-followup,       action: "Schedule when the woman will return for monitoring" }

  # Ch. 5.1 — HPV DNA test characteristics
  - id: hpv-dna-test
    bindingness: legal
    description: "Primary screening test in hpv-capable localities."
    target_age: [35, 45]
    panel: "14 high-risk HPV types"
    pilot_platform: "careHPV (Qiagen) — pooled detection of 14 hr-HPV types; does not type 16/18 separately."
    collection_sequence:
      - "Cytology sample taken and stored first."
      - "HPV DNA sample taken second."
    rationale_under_30: >-
      Not recommended under age 30 because most HPV infections in younger
      women clear spontaneously.
    procedure_ref: "5.2"

  # Ch. 5.1 — acetic acid test (VIA/VILI) defined but NOT used as screening
  - id: acetic-acid-test
    bindingness: legal
    description: "Defined as a procedure but NOT used in the national screening programme."
    usable_when: "Transformation zone visible; under age 50."
    not_suitable_when: "Post-menopausal (transformation zone retracts into cervical canal)."
    solution: "3-5% acetic acid"
    reading_time: "one minute"
    procedure_ref: "5.3"

  # Ch. 5.1 — cytology
  - id: cytology-test
    bindingness: legal
    variants: [conventional-pap, liquid-based]
    classification: "Bethesda system (Annex 5 = Bethesda 2014)."
    target_age: [30, 33, 36, 39, 42, 45, 48, 51, 54, 57, 60]
    applicability: "hpv-incapable localities."
    procedure_ref: "5.4"

  # Ch. 5.2 — diagnostic tests (triage)
  # @l1: input/L1/ch05-precancer-dx-tx.md#Section-5-2
  - id: diagnostic-tests
    bindingness: legal
    items:
      - { name: colposcopy,             magnification: "5-15x",                  procedure_ref: "5.6" }
      - { name: tissue-biopsy,          under: colposcopy-guidance,              output: CIN-grade, procedure_ref: "5.7" }
      - { name: endocervical-curettage, indications: [tz-not-fully-visible],     procedure_ref: "5.8" }

  # Ch. 5.4 — treatment modalities (RESTRUCTURED in v0.2.0).
  # v0.1.0 mistakenly listed LEEP under "diagnostic-tests" — LEEP is a
  # treatment, not a diagnostic test. v0.2.0 separates them and adds the
  # two missing modalities: Thermal Ablation and Cone-Shaped Excision.
  # @l1: input/L1/ch05-precancer-dx-tx.md#Section-5-4
  - id: treatment-modalities
    bindingness: legal
    items:
      - id: thermal-ablation
        mongolian: "Дулаанаар түлэх эмчилгээ"
        description: "Heat the transformation zone to ~100°C with a metal probe; 5 repeated applications of 20-40 seconds."
        indications: [CIN2, CIN3]
        contraindications:
          - "Invasive cancer"
          - "Glandular cell dysplasia"
          - "Pelvic inflammation"
          - "Vaginal trichomoniasis, candidal vaginosis, hairy fungus, genital sores, bleeding"
          - "<3 months postpartum"
          - "Hypertensive (until BP treated)"
        applicable_at: "Any tier of trained provider, ambulatory."
        post_procedure: "Healthy tissue regenerates in ~1 month; abstain from sex during this period; condoms if necessary."
        notes: "WHO-recommended approach. ADDED in v0.2.0; was missing from v0.1.0."

      - id: leep
        mongolian: "Цахилгаан гогцоогоор өөлөх эмчилгээ"
        description: "Loop electrosurgical excision under local anaesthesia; cuts away abnormal tissue and seals bleeding simultaneously."
        indications: [CIN1, CIN2, CIN3]
        contraindications:
          - "Invasive cancer"
          - "Glandular cell dysplasia"
          - "Pelvic inflammation, vaginal infections, sores, bleeding"
          - "<3 months postpartum"
          - "Hypertensive (until BP treated)"
        applicable_at: "Health facility with anaesthesia capability; trained ob-gyn."
        post_procedure: "Bleeding from vagina for first 7-10 days; lighter yellow discharge for ~1 month; abstain from sex."
        procedure_ref: "5.9"

      - id: cone-shaped-excision
        mongolian: "Хутгаар шаантаг хэлбэртэй тайрах мэс засал"
        description: "Excises the inner and outer portions of the cervix in a cone shape (cold-knife conization)."
        indications: ["When LEEP is not feasible", "AIS / БЭБӨ"]
        applicable_at: "Specialist; surgical theater."
        post_procedure: "Yellow discharge for 7-14 days; tissue regenerates in 4-6 weeks; abstain from sex."
        procedure_ref: "5.10"
        notes: "ADDED in v0.2.0; was missing from v0.1.0."

# =============================================================================
# Section 6 — Algorithms
# =============================================================================
algorithms:

  # Ch. 2.2 Zurag 2.3 — cytology-based screening algorithm
  - id: alg-cytology-arm
    bindingness: legal
    slice: { lab_capacity: hpv-incapable, primary_test: cytology }
    name: "Cytology-based screening (localities without HPV capacity)."
    schema_refs: [zurag-2.3]
    forms: [ЭИМ-5а, ЭИМ-5в, ЭИМ-5д]
    rule: |
      Cytology taken from women at ages {30,33,36,39,42,45,48,51,54,57,60}.
      Result NILM (negative)         -> next scheduled screening.
      Result >= ASC-US               -> follow appropriate Ch. 5 sub-algorithm
                                        by Bethesda category.

  # Ch. 2.2 Zurag 2.4 — HPV-based screening algorithm
  - id: alg-hpv-arm
    bindingness: legal
    slice: { lab_capacity: hpv-capable, primary_test: hpv-dna }
    name: "HPV DNA-based screening (localities with HPV capacity)."
    schema_refs: [zurag-2.4]
    forms: [ЭИМ-5а, ЭИМ-5б, ЭИМ-5в, ЭИМ-5г, ЭИМ-5д, АМ-5]
    rule: |
      Cytology sample taken and stored; HPV sample sent to lab.
      HPV negative                   -> return to routine interval (next test
                                        at 45 if first test was at 35).
      HPV positive                   -> reflex cytology (read stored sample).
        reflex cytology negative     -> repeat HPV at +1 year.
          repeat HPV negative        -> return to routine.
          repeat HPV positive        -> colposcopy.
        reflex cytology >= ASC-US    -> colposcopy.
      Colposcopy adequate            -> biopsy.
        biopsy negative              -> next scheduled screening.
        biopsy CIN1                  -> follow CIN protocol.
        biopsy CIN2/CIN3             -> follow CIN protocol (LEEP / cone).
        biopsy cancer                -> follow cancer pathway (form АМ-5).
      Colposcopy inadequate          -> endocervical curettage + biopsy.
      Exit conditions:
        - negative at age 35 AND age 45 -> remove from screening registry.
        - age 35 negative               -> continue to scheduled HPV at 45.

  # Programmatic-overlay algorithm — April 2025 launch.
  # Same shape as alg-hpv-arm but at programmatic ages 30/40.
  - id: alg-hpv-arm-programmatic
    bindingness: programmatic
    slice: { primary_test: hpv-dna }
    name: "HPV DNA-based screening (April 2025 programmatic overlay, ages 30 and 40)."
    rule: |
      Identical to alg-hpv-arm, but target ages are {30, 40} per the April 2025
      launch announcement. Triage tree (reflex cytology -> colposcopy -> biopsy)
      is unchanged.
    notes: |
      This algorithm is enacted only at programme-funded sites under the
      elimination initiative. A/641's legal binding still applies to all
      MOH-supervised facilities outside the programme.

# =============================================================================
# Section 7 — Triage sub-algorithms (Ch. 5.3, Bethesda-branched)
# =============================================================================
triage_sub_algorithms:
  - id: trs-asc-us-general
    bindingness: legal
    when: { cytology_result: ASC-US, population: general }
    schema_ref: zurag-5.1
    rule: |
      Two options:
      (a) Repeat cytology at 4–6 months; if negative -> next routine;
          if >= ASC-US -> colposcopy.
      (b) Direct colposcopy; CIN/cancer found -> CIN/cancer protocol;
          not found -> repeat cytology at 12 months.

  - id: trs-asc-us-post-menopausal
    bindingness: legal
    when: { cytology_result: ASC-US, population: post-menopausal }
    schema_ref: zurag-5.2
    rule: |
      If no contraindication -> topical estrogen therapy -> repeat cytology
      7 days after completion -> if negative, repeat again at 4–6 months ->
      if negative, next routine. If any step >= ASC-US -> colposcopy.
      Colposcopy findings: CIN/cancer -> CIN/cancer protocol; otherwise ->
      repeat cytology at 12 months.

  - id: trs-asc-h
    bindingness: legal
    when: { cytology_result: ASC-H, population: all }
    schema_ref: zurag-5.3
    rule: |
      Direct colposcopy.
      Biopsy-confirmed CIN (any grade) -> CIN protocol.
      No finding                       -> repeat cytology + colposcopy at 2-3 months.

  - id: trs-lsil-general
    bindingness: legal
    when: { cytology_result: LSIL, population: general }
    schema_ref: zurag-5.4
    rule: |
      Direct colposcopy.
      CIN/cancer found    -> CIN/cancer protocol.
      Not found           -> repeat cytology at 6-12 months.
        negative          -> next routine.
        >= ASC-US         -> repeat colposcopy.
    note: "Pregnant and post-menopausal women follow different schemas."

  - id: trs-lsil-post-menopausal
    bindingness: legal
    when: { cytology_result: LSIL, population: post-menopausal }
    schema_ref: zurag-5.5
    rule: |
      Estrogen therapy first; then repeat cytology 7 days after completion.
      Negative          -> repeat cytology at 4-6 months.
      >= ASC            -> colposcopy.

  - id: trs-hsil
    bindingness: legal
    when: { cytology_result: HSIL, population: all }
    schema_ref: zurag-5.6
    rule: |
      Colposcopy.
      If colposcopy assessable:
        biopsy CIN2,3 confirmed -> CIN or cancer protocol.
        CIN1 / no finding       -> re-review material.
          material review >= CIN2 -> LEEP (electrical excision) or treat per CIN protocol.
          material review < CIN2  -> repeat cytology at 6 months.
      If colposcopy not assessable -> biopsy alternative procedure.
        CIN (any grade) confirmed  -> follow CIN protocol.

  # ADDED in v0.2.0 — Зураг 5.7. AGC has its own algorithm, distinct from
  # the squamous-lineage sub-algorithms above. Currently no L3 representation.
  - id: trs-agc
    bindingness: legal
    when: { cytology_result: AGC, population: all }
    schema_ref: zurag-5.7
    rule: |
      Under colposcopic guidance, take cervical tissue biopsy.
      ALSO: in women aged 35+ with abnormal uterine bleeding, take endometrial biopsy.
      If endometrial atypical cells found -> endometrial biopsy.
      If cancer NOT diagnosed -> repeat cytology
        CIN or AIS found     -> follow CIN or glandular-cancer protocol
        Normal               -> cytology every 4-6 months × 4
          ASCUS or LSIL on follow-up -> repeat colposcopy
          HSIL or AGC on follow-up   -> repeat colposcopy
      If cancer is present -> refer to ХЦУТ (National Cancer Center).

  # ADDED in v0.2.0 — Зураг 5.8. Post-diagnosis follow-up after CIN1
  # confirmation. Current L2 stops at the triage level; this captures
  # the post-diagnosis monitoring tree.
  - id: trs-cin1-confirmed-followup
    bindingness: legal
    when: { cin_grade: CIN1, "diagnosis_status": "confirmed-by-adequate-colposcopy-and-biopsy" }
    schema_ref: zurag-5.8
    rule: |
      CIN1 confirmed by adequate colposcopy + biopsy. Two paths:

      (a) Without immediate treatment:
        - Cytology at 6 months and 12 months
        - Colposcopy + cytology 12 months later
        - Returned to normal -> annual cytology surveillance
        - From follow-up cytology:
          - Negative   -> annual cytology
          - >= ASCUS   -> repeat colposcopy
          - CIN found  -> repeat colposcopy
            CIN not found on repeat -> annual cytology
            Stable CIN1 / progressed to CIN2 -> follow CIN/cancer protocol

      (b) With treatment: per shared decision (LEEP or thermal ablation).

  # ADDED in v0.2.0 — Зураг 5.9. CIN2 confirmation tree.
  - id: trs-cin2-confirmed-followup
    bindingness: legal
    when: { cin_grade: CIN2, "diagnosis_status": "confirmed-by-colposcopy-and-biopsy" }
    schema_ref: zurag-5.9
    rule: |
      CIN2 confirmed by adequate colposcopy + biopsy.

      If colposcopy assessable: Excision involving the transformation zone
        (with possible methods: LEEP, thermal ablation, cone-shaped excision).

      If colposcopy not assessable: Excision for diagnosis-confirmation
        purpose, including the transformation zone (with possible method).

      Then post-treatment monitoring:
        Repeat cytology 4-6 months later, OR colposcopy + cytology 4-6 months later
          3 negative results in succession -> annual cytology surveillance
          >= ASCUS (confirmed by repeat cytology) -> colposcopy

      If CIN3 diagnosed -> refer to ХЦУТ (National Cancer Center).

  # ADDED in v0.2.0 — Зураг 5.10. CIN2/CIN3 OR AIS treatment branching.
  - id: trs-cin2-cin3-or-ais-treatment
    bindingness: legal
    when_any:
      - { cin_grade: CIN2 }
      - { cin_grade: CIN3 }
      - { glandular_lesion: AIS }
    schema_ref: zurag-5.10
    rule: |
      Two parallel treatment tracks based on histology:

      For CIN 2 or CIN 3:
        - LEEP, OR
        - Cone-shaped excision (хутгаар шаантаг хэлбэртэй тайрах), OR
        - Hysterectomy (abdominal or vaginal approach).

      For AIS / Adenocarcinoma in situ (БЭБӨ):
        - For women wishing to preserve fertility: cone-shaped excision
        - For women not wishing fertility preservation: hysterectomy
          (abdominal or vaginal approach)
        - If repeat cytology returns abnormal post-cone, perform colposcopy
          + tissue biopsy and confirm diagnosis

  # ADDED in v0.2.0 — post-treatment monitoring schedule (§5.4.6).
  - id: post-treatment-monitoring
    bindingness: legal
    schema_ref: "Ch. 5.4 (pp. 59-60)"
    rule: |
      Mandatory follow-up exam 2-6 weeks after treatment ends:
        - Speculum exam to check normal healing.
        - Discuss histopathology results with patient.
        - Schedule repeat exam, explain importance of active monitoring.

      If lesion fully removed: 6-12 months later for repeat exam; if margins
      positive, more frequent monitoring.

      6-12 months later: colposcopy; if pathology found, mandatory tissue biopsy.

      If first two follow-up exams negative: follow ASCUS/LSIL algorithm.

      HSIL-treated patients: monitored ANNUALLY for 5 YEARS, then resume
      regular screening cycle.

# =============================================================================
# Section 8 — Special conditions (Ch. 5.2)
# =============================================================================
special_conditions:
  - id: ecc-indication-tz
    bindingness: legal
    when: "Transformation zone not fully visible."
    action: "Endocervical curettage + biopsy; if not feasible, ablative cryotherapy or cervical excision considered."
  - id: pregnancy-positive-screen
    bindingness: legal
    when: { population: pregnant, screening: positive }
    action: >-
      Colposcopy during pregnancy if cervical changes visible. Biopsy 6-12 weeks
      post-partum unless invasive cancer suspected; if invasive cancer suspected,
      refer to specialist centre.
  - id: hiv-positive-handling
    bindingness: legal
    rule: "Colposcopy and biopsy follow the same indications as HIV-negative; no modification of screening protocol based on HIV alone."

# =============================================================================
# Section 9 — Recall trigger matrix (Ch. 2.3, p. 28)
# =============================================================================
# Six concrete operational timeouts that the registry/recall system uses to
# detect cascade-attrition events. These are the L2 source for any L3
# OverdueFor / "X has not happened by Y" CQL define.
#
# Each row's clock starts at a specific event and fires when no resolving
# event has occurred within the threshold.
recall_triggers:
  - id: hpv-result-not-in-registry
    bindingness: legal
    clock_starts_at: "HPV sample dispatched to lab"
    threshold: 3w
    condition: "HPV result not yet entered into the screening registry"
    action: "Flag the dispatching facility for follow-up with the lab"

  - id: cytology-slide-unread
    bindingness: legal
    clock_starts_at: "Cytology slide received at lab"
    threshold: 2w
    condition: "Cytology not yet read"
    action: "Flag the cytology lab for delayed read"

  - id: positive-result-no-followup
    bindingness: legal
    clock_starts_at: "Positive screening result entered into registry"
    threshold: 4w
    condition: "No follow-up exam (reflex cytology, colposcopy, etc.) recorded"
    action: "Issue first reminder (form ЭИМ-5е) to client"

  - id: biopsy-unread
    bindingness: legal
    clock_starts_at: "Biopsy tissue received at lab"
    threshold: 4w
    condition: "Biopsy not yet read"
    action: "Flag the histology lab for delayed read"

  - id: positive-biopsy-no-treatment
    bindingness: legal
    clock_starts_at: "Positive biopsy diagnosis entered into registry"
    threshold: 4w
    condition: "No treatment record (LEEP, cone, ablation, etc.)"
    action: "Refer client back to gynecologist; if necessary escalate to NCC"

  - id: second-reminder
    bindingness: legal
    clock_starts_at: "First reminder (ЭИМ-5е) sent"
    threshold: 4w
    condition: "Client has not responded or attended"
    action: "Issue second reminder; consider community-health-worker outreach"

  - id: missed-scheduled-exam
    bindingness: legal
    clock_starts_at: "Client's scheduled exam date"
    threshold: 0d
    condition: "Client did not attend scheduled exam"
    action: "Immediate flag for outreach"

# =============================================================================
# Section 10 — Result code mapping (TWO separate mappings)
# =============================================================================
# CORRECTION FROM v0.1.0
#   v0.1.0 had a single `result_code_mapping` section attributed to "Annex 4
#   Table X.4" that conflated TWO distinct mappings from the source.
#   v0.2.0 splits them properly:
#
#   (a) result_code_mapping_icd10 — from Хүснэгт 2.2 (Ch. 2.3.3, p. 27).
#       Maps the SCREENING/DIAGNOSTIC ENCOUNTER to ICD-10 codes
#       (Z-codes for screening visits without diagnosis vs. N/D/C codes
#       when a condition is diagnosed). This is the encounter-level
#       coding used by the registry.
#
#   (b) result_code_mapping_pap_bethesda_cin_who — from Хүснэгт X.4
#       (Annex 4, p. 156). Maps PAP class × Bethesda × CIN × WHO
#       descriptive terminology. This is the LAB-RESULT INTERPRETATION
#       hierarchy used by cytologists and histopathologists.

# (a) Encounter-level ICD-10 coding from Хүснэгт 2.2
# @l1: input/L1/ch02-screening.md#2-3-3-Result-coding-mapping
result_code_mapping_icd10:
  - encounter_state: screening_visit_no_diagnosis_yet
    icd10_codes:
      - { code: "Z01.4", label: "General/routine women's exam (incl. cervical Pap)" }
      - { code: "Z12.4", label: "Special exam to detect cervical cancer" }
  - encounter_state: diagnosed_condition
    icd10_codes:
      - { code: "N86",         label: "Cervical erosion and ectropion" }
      - { code: "N87.0-N87.9", label: "Cervical dysplasia (CIN1/CIN2/CIN3 spectrum)" }
      - { code: "N88.0-N88.9", label: "Other non-inflammatory disorders of cervix" }
      - { code: "D06",         label: "Carcinoma in situ of cervix" }
      - { code: "C53.0-C53.9", label: "Malignant neoplasm of cervix" }

# (b) Lab-result classification cross-tab from Хүснэгт X.4
# @l1: input/L1/annex-04-05-classification.md#4-2
# Note: third column is WHO TERMINOLOGY (descriptive English-medical), not ICD-10.
result_code_mapping_pap_bethesda_cin_who:
  - { pap_class: "I",   bethesda: NILM,        cin: normal,                          who_descriptive: "Normal" }
  - { pap_class: "II",  bethesda: ASC-US,      cin: normal,                          who_descriptive: "Normal" }
  - { pap_class: "II",  bethesda: ASC-H,       cin: normal,                          who_descriptive: "Normal" }
  - { pap_class: "III", bethesda: LSIL,        cin: "CIN1 with flat condyloma",      who_descriptive: "Koilocytosis" }
  - { pap_class: "III", bethesda: HSIL,        cin: CIN2,                            who_descriptive: "Moderate dysplasia" }
  - { pap_class: "III", bethesda: HSIL,        cin: CIN3,                            who_descriptive: "Severe dysplasia" }
  - { pap_class: "IV",  bethesda: HSIL,        cin: CIN3,                            who_descriptive: "Carcinoma in situ (CIS, Байран өмөн)" }
  - { pap_class: "V",   bethesda: invasive,    cin: invasive,                        who_descriptive: "Invasive cancer (Цөмөрсөн өмөн)" }

# Aliases for backwards-compatibility with v0.1.0 references — DEPRECATED.
# Use result_code_mapping_icd10 or result_code_mapping_pap_bethesda_cin_who.
# Will be removed in a future revision.
result_code_mapping: &result_code_mapping_deprecated
  deprecated: true
  see_instead: [result_code_mapping_icd10, result_code_mapping_pap_bethesda_cin_who]

# =============================================================================
# Section 11 — Procedures (Ch. 5)
# =============================================================================
procedures:
  - { id: "5.1", name_en: "History-taking and gynecological examination",      name_mn: "Дурдатгал (анамнез) авах, эмэгтэйчүүдийн тусгайлсан үзлэг хийх" }
  - { id: "5.2", name_en: "Molecular biology method — HPV DNA test",           name_mn: "Молекул биологийн арга — Хүний папиллома вирусын ДНХ илрүүлэх шинжилгээ" }
  - { id: "5.3", name_en: "Acetic acid test (VIA)",                            name_mn: "Цууны хүчлийн сорил" }
  - { id: "5.4", name_en: "Cytology examination",                              name_mn: "Эсийн шинжилгээ" }
  - { id: "5.5", name_en: "Counseling on positive result",                     name_mn: "Шинжилгээний хариу эерэг гарсан тохиолдолд өгөх зөвлөгөө" }
  - { id: "5.6", name_en: "Colposcopy examination",                            name_mn: "Кольпоскопийн шинжилгээ" }
  - { id: "5.7", name_en: "Histology (tissue biopsy)",                         name_mn: "Эдийн шинжилгээ" }
  - { id: "5.8", name_en: "Endocervical curettage and biopsy",                 name_mn: "Умайн хүзүүний сувгаас хусаж авах шинжилгээ" }
  - { id: "5.9", name_en: "LEEP — Loop Electrical Excision Procedure",         name_mn: "Умайн хүзүүг цахилгаан гогцоогоор өөлөх эмчилгээ: LEEP" }
  - { id: "5.10", name_en: "Cone-shaped cervical excision (cold knife)",       name_mn: "Умайн хүзүүг хутгаар шаантаг хэлбэрээр тайрах" }

# =============================================================================
# Section 12 — Registry forms (BOTH naming systems represented)
# =============================================================================
# CORRECTION FROM v0.1.0
#   v0.1.0 represented only the Cyrillic-letter set (ЭИМ-5а..5е) on the
#   theory that "ЭИМ-5.1 / ЭИМ-5.2" labels were a misreading. v0.2.0
#   confirms (from the L1 read) that the source uses BOTH naming systems
#   concurrently and they refer to DIFFERENT artifact types:
#
#   - ЭИМ-5.1 and ЭИМ-5.2 are SUMMARY PATIENT RECORDS (sometimes called
#     "screening pages") at primary care vs. secondary care tiers
#     respectively. They appear as form codes in figures 2.3, 2.4, 2.5
#     (Зураг). NO standalone form template appears in Annex 1 — these
#     may be ambulatory-card sections rather than separate forms.
#
#   - ЭИМ-5а through ЭИМ-5е are ACCOMPANYING SLIPS (invitation, sample
#     referral, result, recall) listed in Хүснэгт 2.1 (p. 27) and with
#     templates in Annex 1 (pp. 147-152).
#
#   - АМ-5 is the cervical-cancer notification page.
#
# @l1: input/L1/annex-01-forms.md and input/L1/ch02-screening.md#2-3-2
forms:
  # --- Summary patient records ---
  - id: ЭИМ-5.1
    type: summary-patient-record
    purpose: "Cervical cancer screening summary record at PRIMARY CARE tier."
    location: "Referenced in Зураг 2.3 (cytology arm) and Зураг 2.4 (HPV arm primary-care steps); Зураг 2.5 (info flow)."
    used_at:
      - "Family/sum/village health centers (Өрх, сум тосгоны ЭМТ)"
      - "Intersum hospitals, rural integrated hospitals"
      - "Licensed private clinics"
    template_in_annex_1: false
    notes: |
      No standalone form template in Annex 1; may be a section of the
      ambulatory card. ADDED in v0.2.0; was missing from v0.1.0.

  - id: ЭИМ-5.2
    type: summary-patient-record
    purpose: "Cervical cancer screening summary record at SECONDARY CARE tier."
    location: "Referenced in Зураг 2.4 (HPV arm secondary-care steps); Зураг 2.5 (info flow)."
    used_at:
      - "Aimag/district integrated hospitals (НЭ)"
      - "Specialty hospitals (ЭМН), specialized centers"
      - "Licensed private hospitals"
    template_in_annex_1: false
    notes: |
      No standalone form template in Annex 1. ADDED in v0.2.0; was missing
      from v0.1.0.

  # --- Accompanying slips ---
  - id: ЭИМ-5а
    type: accompanying-slip
    purpose: "Invitation to screening / enrollment into recall system."
    location: "Annex 1, p. 147"
    issued_at_tier: primary
    fields_summary:
      - "Овог (last name), Нэр (first name)"
      - "Phone, address, email"
      - "Birth month, birth year"
      - "Screening type: ☐ cytology-based ☐ HPV-based"
      - "Scheduled date/time"
      - "(Note: invitation must be delivered within 7 days BEFORE birthday)"
    used_in: [alg-cytology-arm, alg-hpv-arm]

  - id: ЭИМ-5б
    type: accompanying-slip
    purpose: "HPV sample referral (accompanies sample to lab)."
    location: "Annex 1, p. 148"
    issued_at_tier: primary
    embedded_anamnesis: true
    embedded_anamnesis_fields:
      # Confirmed from L1 read against Annex 1 p. 148.
      - { field: symptoms,             type: checkbox-group, options: [none, vaginal-discharge, bleeding, heavy-menstrual-bleeding, post-menopausal-bleeding, other] }
      - { field: contraception,        type: checkbox-group, options: [none, hormonal-pill, IUD-implant, IUD-wire, condom, other] }
      - { field: smoking,              type: checkbox-group, options: [yes, no, previously-smoked, no-answer] }
      - { field: previously-screened,  type: yes-no }
      - { field: hpv-vaccinated,       type: checkbox-group, options: [yes, no, dont-know] }
      - { field: prior-cytology-cadence, type: checkbox-group, options: [regular-3y, irregular, never, dont-know, no-answer] }
      - { field: prior-abnormality-action, type: checkbox-group, options: [treated-recovered, currently-monitored, declined-treatment, dont-know, no-answer] }
      - { field: prior-abnormality-detected, type: checkbox-group, options: [yes, no, dont-know, no-answer] }
      - { field: tampon-use,           type: checkbox-group, options: [yes, no, previously-used, no-answer] }
      - { field: speculum-finding,     type: checkbox-group, options: [normal, with-sores, bleeding-on-touch, cancer-suspicious] }
      - { field: colposcopy-finding,   type: checkbox-group, options: [not-performed, normal, other, metaplasia, hpv-visual, cervical-cancer, lsil-visual, hsil-visual, cannot-conclude] }
    fields_summary:
      - "Identifiers: Регистр (national ID), name, age, address, phones, email"
      - "Sample date, lab dispatch date, last menstrual period date"
      - "(see embedded_anamnesis_fields for the structured mini-anamnesis)"
    used_in: [alg-hpv-arm]

  - id: ЭИМ-5в
    type: accompanying-slip
    purpose: "Cytology sample referral (accompanies slide to lab)."
    location: "Annex 1, p. 149"
    issued_at_tier: primary
    embedded_anamnesis: true
    embedded_anamnesis_fields: "Same as ЭИМ-5б."
    additional_fields:
      - { field: slide-number, type: code, options: [new, monitoring-repeat] }
    used_in: [alg-cytology-arm, alg-hpv-arm]   # Both arms can produce cytology

  - id: ЭИМ-5г
    type: accompanying-slip
    purpose: "Tissue (biopsy / LEEP / cone) sample referral."
    location: "Annex 1, p. 150"
    issued_at_tier: secondary    # CORRECTED in v0.2.0 — only issued at secondary care
    fields_summary:
      - "Sample type: ☐ obtained via biopsy / ☐ via LEEP / ☐ via cone-shaped excision"
      - "Pregnancy status, gravida/para/abortion/miscarriage counts"
      - "Contraception, visual cervix findings"
      - "Prior cervical biopsy, TORCH status, preliminary clinical dx"
    used_in: [trs-cin1-confirmed-followup, trs-cin2-confirmed-followup, trs-cin2-cin3-or-ais-treatment]

  - id: ЭИМ-5д
    type: accompanying-slip
    purpose: "Result/conclusion sheet given back to the client."
    location: "Annex 1, p. 151"
    issued_at_tier: primary
    fields_summary: "Free-text result, diagnosis, follow-up plan. ⚠️ Result codes are FREE TEXT in this form, not constrained to a coded vocabulary."
    used_in: [alg-cytology-arm, alg-hpv-arm]

  - id: ЭИМ-5е
    type: accompanying-slip
    purpose: "Recall reminder for repeat screening / follow-up."
    location: "Annex 1, p. 152"
    issued_at_tier: both         # CORRECTED in v0.2.0 — issued at both tiers
    fields_summary:
      - "Reason: ☐ prior sample inadequate / ☐ post-treatment outcome / ☐ monitoring repeat"
      - "Scheduled recall date"
      - "Date repeat exam was performed (or action taken if patient did not respond)"
    used_in: [recall_triggers.positive-result-no-followup, recall_triggers.second-reminder]

  - id: АМ-5
    type: cancer-notification
    purpose: "Cervical-cancer notification page (when invasive cancer detected)."
    location: "Cancer-notification series"
    issued_at_tier: secondary
    used_in: [alg-hpv-arm]   # invoked when biopsy returns invasive

access_controls: "Op.Inst. 2.2 — restrictions on electronic-registry access by health organization."

# =============================================================================
# Section 12.5 — Registry architecture (Зураг 2.5, p. 26)
# =============================================================================
# ADDED in v0.2.0. The screening registry has a three-tier hierarchy with
# distinct form-flow paths from each tier. Was missing from v0.1.0.
# @l1: input/L1/ch02-screening.md#2-3-1
registry_architecture:
  tiers:
    - id: primary-care
      tier_label: "Primary care"
      facilities:
        - "Family health centers (Өрхийн ЭМТ)"
        - "Sum/village health centers (Сум, тосгоны ЭМТ)"
        - "Intersum hospitals (Сум дундын эмнэлэг)"
        - "Rural integrated hospitals (Хөдөөгийн нэгдсэн эмнэлэг)"
      reports_using: [ЭИМ-5.1, ЭИМ-5а, ЭИМ-5б, ЭИМ-5в, ЭИМ-5д, ЭИМ-5е]
      reports_to: secondary-care
    - id: secondary-care
      tier_label: "Secondary care"
      facilities:
        - "Aimag integrated hospital / Regional dx-tx center (Аймгийн НЭ, БОЭТ; cancer registrar)"
        - "District health center (Дүүргийн ЭМТ; cancer registrar)"
        - "Specialty centers, specialized hospitals"
        - "Licensed private hospitals/clinics"
      reports_using: [ЭИМ-5.2, ЭИМ-5г, ЭИМ-5е, АМ-5]
      reports_to: national-cancer-center
    - id: national-cancer-center
      tier_label: "National Cancer Center (ХЦУТ)"
      systems:
        - "Cancer screening data bank (Хорт хавдрын илрүүлгийн мэдээний сан)"
        - "Cancer screening electronic registry & recall system (www.cancer-screening.gov.mn)"
      reports_to: [aimag-health-departments, capital-health-department, health-development-center, ministry-of-health]
  electronic_registry_url: "www.cancer-screening.gov.mn"
  notes: |
    The registry has both a "data bank" side (incoming reports, screening
    data) and a "recall system" side (outgoing reminders, callback
    triggers). Access controls are governed by Op.Inst. 2.2.

# =============================================================================
# Section 13 — Indicators (Annex 2 — full 14-metric framework)
# =============================================================================
# UPDATED in v0.2.0. Annex 2 has been confirmed by direct read to define
# EXACTLY 14 metrics (numbered 1-14, with one metric double-numbered as #11).
# v0.1.0 said "estimated >9"; the correct count is 14.
#
# cxca's L3 currently implements 5-7 of the 14. The remaining metrics are
# operational measures (invitation rates, response times, age-specific case
# counts) that are outside cxca's current scope but realistic Phase 8+ work.
# @l1: input/L1/annex-02-indicators.md
indicators:
  # Annex 2 framework — full 14-metric list, with implementation status per metric
  framework_metrics:
    - { num: 1,   indicator: "Target population (Зорилтот хүн ам)",                                              implementation_status: "implicit (used as denominator across coverage measures)" }
    - { num: 2,   indicator: "Screening frequency (Илрүүлгийн давтамж)",                                        implementation_status: "implicit (encoded in PlanDefinition recall scheduling)" }
    - { num: 3,   indicator: "Invitation status (Илрүүлэг үзлэгт урьсан байдал)",                              implementation_status: "not yet implemented" }
    - { num: 4,   indicator: "% of invited who attended (Уригдсанаас хамрагдсан хувь)",                         implementation_status: "not yet implemented" }
    - { num: 5,   indicator: "Time from invitation to attendance",                                              implementation_status: "not yet implemented" }
    - { num: 6,   indicator: "Invitation rate (Урьсан хувь)",                                                   implementation_status: "not yet implemented" }
    - { num: 7,   indicator: "Screening coverage rate (Илрүүлгийн хамралтын хувь)",                            implementation_status: "implemented as CXCAIND01, CXCAIND02, CXCAIND04" }
    - { num: 8,   indicator: "Target-age population coverage / lifetime",                                       implementation_status: "not yet implemented" }
    - { num: 9,   indicator: "Screening detection level / first-time (Илрүүлгийн түвшин)",                     implementation_status: "implemented as CXCAIND07" }
    - { num: 10,  indicator: "Positive results count (Эерэг хариу)",                                           implementation_status: "not yet implemented as count" }
    - { num: "11a", indicator: "% with positive result (Эерэг хариу гарсан хувь)",                              implementation_status: "implemented as CXCAIND03" }
    - { num: "11b", indicator: "Negative results count (Сөрөг хариу) — note: source double-numbers this as #11", implementation_status: "not yet implemented as count" }
    - { num: 12,  indicator: "% receiving treatment (Эмчилгээнд хамрагдсан хувь)",                             implementation_status: "implemented as CXCAIND06, CXCAIND08" }
    - { num: 13,  indicator: "Age-specific new cervical cancer cases",                                          implementation_status: "not yet implemented" }
    - { num: 14,  indicator: "Algorithm-driven treatment of cancer-suspected cases",                            implementation_status: "not yet implemented (this would specifically measure protocol adherence in the triage cascade)" }

  # cxca L3 implementations — detail per implemented Measure
  implemented_measures:
    - id: CXCAIND01
      bindingness: legal
      title: "Cervical Cancer Screening Coverage at Age 35"
      source_anchor: "A/641 Annex 2 #7 (coverage %), HPV-pathway first binding age."
      l3_artifact: input/fsh/measures/CXCAIND01.fsh
    - id: CXCAIND02
      bindingness: legal
      title: "Cytology-pathway coverage"
      source_anchor: "A/641 Annex 2 #7 — coverage at cytology-pathway target ages."
      l3_artifact: input/fsh/measures/CXCAIND02.fsh
    - id: CXCAIND03
      bindingness: legal
      title: "HPV positivity rate"
      source_anchor: "A/641 Annex 2 #11a — positivity metric on the HPV arm."
      l3_artifact: input/fsh/measures/CXCAIND03.fsh
    - id: CXCAIND04
      bindingness: legal
      title: "Cervical Cancer Screening Coverage at Age 45"
      source_anchor: "A/641 Annex 2 #7 (coverage %), HPV-pathway second binding age."
      l3_artifact: input/fsh/measures/CXCAIND04.fsh
    - id: CXCAIND06
      bindingness: legal
      title: "Cascade completion (HPV+ to follow-up cytology)"
      source_anchor: "A/641 Annex 2 #12 — derived from §2.3 recall triggers + Annex 2 cascade metrics."
      l3_artifact: input/fsh/measures/CXCAIND06.fsh
      methodology_notes: |
        One of the four methodology contributions of this DAK: numerator includes
        both "cytology performed" AND "explicit non-occurrence" (via the
        CXCAServiceNotRequested profile). Patients absent from records are
        neither numerator nor denominator, surfacing rather than hiding LTFU.
    - id: CXCAIND07
      bindingness: legal
      title: "Detection rate / Илрүүлгийн түвшин"
      source_anchor: "A/641 Annex 2 #9."
      l3_artifact: input/fsh/measures/CXCAIND07.fsh
    - id: CXCAIND08
      bindingness: legal
      title: "Treatment completion among biopsy-positive women"
      source_anchor: "A/641 Annex 2 #12 — derived from §2.3 positive-biopsy-no-treatment trigger."
      l3_artifact: input/fsh/measures/CXCAIND08.fsh

# =============================================================================
# Section 14 — Pilot evidence (Khan-Uul HPV-DNA pilot, 2025-2026)
# =============================================================================
# Empirical cascade-completion data from the only Mongolia HPV-DNA pilot.
# This section is not normative — it cannot be cited as an L2 rule — but it
# provides the empirical motivation for the cascade-completion indicators
# and the recall-trigger matrix.
pilot_evidence:
  id: khan-uul-hpv-pilot
  source: country-level/mongolia/who-mongolia-hpv-pilot-conclusion-2026-04-16.md
  source_url: https://www.who.int/mongolia/news/feature-stories/detail-wpro/moh-and-who-concludes-pilot-on-hpv-testing-for-cervical-cancer-screening-in-mongolia
  publication_date: 2026-04-16
  pilot_site: "Khan-Uul District Health Center + 26 family clinics (Ulaanbaatar)"
  test_platform: "careHPV (14 high-risk HPV types pooled)"
  initial_age_range: [35, 45]            # A/641 legal range
  expanded_age_range: [40, 60]           # operational drift, not legal
  cascade:
    hpv_tested: 5382
    hpv_positive: 371
    hpv_negative: 5011
    cytology_completed: 184              # of 371 HPV+
    lost_to_followup: 187                # ≈50% of HPV+
    cytology_abnormal: 54
    cytology_normal: 130
    biopsy_completed: 19                 # of 54 cytology-abnormal
    biopsy_not_obtainable: 35
    histology_precancer: 9
    histology_stage_0: 7
    histology_normal: 3
    treated_at_ncc: 9                    # 7 stage-0 + 2 precancer
    counseled_only: 2
  largest_attrition: "187 HPV+ women lost to follow-up between HPV result and reflex cytology (~50%)."
  l3_implication: |
    The largest single point of attrition is exactly the population the
    §2.3 recall logic (forms ЭИМ-5е reminder cadence; recall_triggers above)
    is supposed to catch. This is the empirical justification for why those
    triggers matter operationally, not just on paper, and for the
    CXCAServiceNotRequested NotDone profile that lets these patients be
    represented in queries rather than absent from data systems.
  burden_2026:
    annual_new_cases: ">500"
    late_stage_proportion: ">40%"
    rank_among_women_cancers: 2          # second most common
    rank_cancer_death_cause: 3           # third leading

