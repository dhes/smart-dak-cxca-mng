# =============================================================================
# Section 16 — Notes
# =============================================================================
notes:
  - "A/641 makes the 2011 screening regime (Order 168/2011 appendix 3) and 2012 amendment (Order 76/2012 appendix 1) partly invalid — see guideline.supersedes for the specific sections."
  - "Screen-and-treat approach is NOT offered; all positive screens must be triaged through colposcopy + biopsy before treatment. This is a stricter stance than WHO 2021, which offers both approaches."
  - "VIA is defined as a procedure (Op.Inst. 5.3) but is NOT used in the national screening programme."
  - "Burden numbers diverge between the April 2025 launch piece (361 new cases / 156 deaths; cervical cancer cited as leading cause of cancer-related deaths in women) and the April 2026 pilot conclusion (>500 cases/year; ranked third). Discrepancy is unexplained — possible updated case counts and/or different counting basis."

