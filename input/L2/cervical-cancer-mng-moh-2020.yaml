# =============================================================================
# Mongolia MOH 2020 Cervical Cancer Surveillance Guideline — L2 Representation
# =============================================================================
#
# ROLE
#   This file is the L2 (operational) layer for the smart-dak-cxca DAK. It is
#   the structured rendering of the Mongolia MOH A/641 (2020) ministerial
#   order — the L1 source — into the axes / parameters / algorithms /
#   triggers / forms / indicators that the L3 FHIR artifacts in this repo
#   derive from.
#
#   Source-of-truth chain for this DAK:
#       L1 (narrative)   A/641 PDF, WHO 2021 guideline, WHO Mongolia news items
#                        ↓
#       L2 (this file)   structured operational representation
#                        ↓
#       L3 (input/fsh, input/cql)   FHIR resources + CQL libraries
#
#   L3 artifacts cite this file via @source: anchors of the form
#       l2://cervical-cancer-mng-moh-2020.yaml#<path>
#   so that runtime contracts (PlanDefinition.action ↔ CQL define ↔
#   ActivityDefinition triples) trace back to a versioned operational anchor.
#
# LINEAGE
#   This file extends the "Shape B" representation that lived at
#       dak-authoring-methodology/country-level/mongolia/
#         cervical-cancer-mng-moh-2020-shape-b.yaml (2026-04-25 draft).
#   The methodology repo retains a snapshot for documentation; this file
#   is the canonical, versioned L2 going forward.
#
# WHAT'S NEW IN THIS REVISION (2026-05-06)
#   1. Form catalog corrected to Cyrillic-letter set ЭИМ-5а..5е + АМ-5
#      (the prior "ЭИМ-5.1 / ЭИМ-5.2" labels were a misreading).
#   2. Op.Inst. 5.1 anamnesis intake structure added as a parameter.
#   3. §2.3 recall trigger matrix added (six timeout rules).
#   4. Result-code mapping added (Bethesda × CIN × ICD-10) from Annex 4/5.
#   5. Bindingness layering added at the top level — A/641 (legal) vs. the
#      April 2025 programmatic position vs. April 2026 pilot operational
#      drift, all surfaced explicitly.
#   6. Timeline section added: A/641 → April 2025 launch → April 2026
#      Khan-Uul pilot conclusion, with regulatory-status annotations.
#   7. Khan-Uul pilot evidence section added with the cascade numbers.
#   8. Indicators section added (cxca's IND01–08 implementations, with
#      Annex 2 cited as the upstream framework — full extraction pending).
#   9. Mappings-to-L3 section added — explicit anchors so L3 CQL/FSH
#      can cite this file by path.
#
# REPRESENTATION NOTES
#   * Chapters relevant to L2: Ch. 2 (screening) and Ch. 5 (pre-cancer
#     diagnosis & treatment). Ch. 1 (intro/anatomy), Ch. 3 (community),
#     Ch. 4 (HPV vaccination), Ch. 6 (invasive cancer), Ch. 7 (palliative)
#     are not represented here.
#   * "Zurag" (Зураг) = figure/diagram in the source PDF.
#   * "ЭИМ" = Эрүүл мэндийн бүртгэлийн маягт (health-registry form).
#   * "АМ" = cancer-notification series; АМ-5 is the cervical-cancer
#     notification page.
#   * Op.Inst. = "Operational Instruction" (Үйлдлийн зааварчилгаа), the
#     procedure-level SOPs in the back of the order.

# -----------------------------------------------------------------------------
# Versioning
# -----------------------------------------------------------------------------
version: 0.1.0
revised: 2026-05-06
authors:
  - Dan Heslinga (independent contributor)
license: CC0-1.0

# =============================================================================
# Section 1 — Guideline (L1 source) metadata
# =============================================================================
guideline:
  id: mng-moh-order-a641-2020
  title: Умайн хүзүүний хорт хавдрын цогц хяналтын заавар
  title_en: Comprehensive Cervical Cancer Surveillance Guideline
  authority: Ministry of Health of Mongolia
  instrument: Ministerial Order A/641
  issued: 2020-12-31
  issued_by: T. Münkhsaikhan (Minister of Health)
  legal_basis:
    - "Law on Government of Mongolia, Article 24(2)"
    - "Health Law, Article 8.1.3"
    - "National Programme on Maternal, Child and Reproductive Health section 3.2.1.8"
    - "National Programme on Non-Communicable Disease Prevention section 3.2.2, section 3.2.6"
  implementing_bodies:
    - { name: "MOH Medical Assistance Services Department", lead: "Ya. Buyanjargal" }
    - { name: "National Cancer Center", lead: "N. Erdenekhuu" }
    - { name: "MOH Cancer Specialty Branch Council", lead: "Ya. Erdene-Ochir" }
  oversight: "Y. Amarjargal (State Secretary)"
  supersedes:
    - { ref: "moh-order-168/2011", partial: "appendix 3, section 3.1, section 6 parts (section 6.4, 6.4.1, 6.4.3, 6.4.5, 6.4.7), section 8.1" }
    - { ref: "moh-order-76/2012",  partial: "appendix 1" }
  superseded_by: null   # As of 2026-05-06, A/641 has NOT been superseded — verified
                        # against MOH 2024/2025 orders registers (moh.gov.mn/laws/46
                        # and /47) through 2025-10-03 (most recent order А/366).
                        # See dak-authoring-methodology/country-level/mongolia/
                        # a641-has-not-been-superceded.md for the verification trail.
  bindingness: normative-national   # Coarse label; see top-level `bindingness:`
